<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title>Login - CineTickets</title>
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>

   <header>
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../pages/about.html">About</a></li>
      <li><a href="../pages/contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>
    <!-- Login Container -->
    <div class="container">
      <form action="#">
        <div class="title">Login</div>
        <div class="logo">
      <img src="../assets/logo.png" alt="CineTickets Logo">
        </div>
        <div class="input-box underline">
          <input type="text" placeholder="Enter Your Email" required>
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Enter Your Password" required>
          <div class="underline"></div>
        </div>
        <div class="input-box button">
          <input type="submit" value="Continue">
        </div>
      </form>

      <div class="option">or Connect With Social Media</div>

      <div class="google">
        <a href="#"><i class="fab fa-google"></i>Sign in With Google</a>
      </div>
      <div class="twitter">
        <a href="#"><i class="fab fa-twitter"></i>Sign in With Twitter</a>
      </div>
      <div class="facebook">
        <a href="#"><i class="fab fa-facebook-f"></i>Sign in With Facebook</a>
      </div>
      <div class="instagram">
        <a href="#"><i class="fab fa-instagram"></i>Sign in With Instagram</a>
      </div>
    </div>

    <script src="../scripts/login.js"></script>
  </body>
</html>
